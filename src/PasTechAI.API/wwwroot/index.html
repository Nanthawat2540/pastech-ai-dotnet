<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasTech AI</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--side:#16181f;--card:#1e2028;--border:#2a2d38;
    --primary:#6c63ff;--primary-hover:#7c74ff;--text:#e8eaf0;--muted:#8b8fa8;
    --user-bg:#6c63ff;--ai-bg:#1e2028;--code-bg:#12141a;
    --green:#4caf7d;--red:#f06292;
  }
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--side);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem}
  .logo-icon{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem}
  .header-controls{display:flex;align-items:center;gap:8px}
  select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:.85rem;cursor:pointer;outline:none}
  select:focus{border-color:var(--primary)}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
  .status-dot.offline{background:var(--red)}
  .btn-icon{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:.85rem;transition:.15s}
  .btn-icon:hover{border-color:var(--primary);color:var(--text)}

  /* Messages */
  #messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
  #messages::-webkit-scrollbar{width:6px}
  #messages::-webkit-scrollbar-track{background:transparent}
  #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .msg{display:flex;gap:10px;max-width:820px;width:100%;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.user{flex-direction:row-reverse;align-self:flex-end}
  .msg.ai{align-self:flex-start}

  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:2px}
  .msg.user .avatar{background:var(--user-bg)}
  .msg.ai .avatar{background:var(--card);border:1px solid var(--border)}

  .bubble{max-width:680px;padding:12px 16px;border-radius:16px;line-height:1.65;font-size:.92rem;white-space:pre-wrap;word-break:break-word}
  .msg.user .bubble{background:var(--user-bg);border-bottom-right-radius:4px}
  .msg.ai .bubble{background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:4px}

  .bubble code{background:var(--code-bg);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:.88em}
  .bubble pre{background:var(--code-bg);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
  .bubble pre code{background:none;padding:0}

  .thinking{display:flex;gap:4px;padding:4px 0}
  .thinking span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
  .thinking span:nth-child(2){animation-delay:.15s}
  .thinking span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:none}30%{transform:translateY(-6px)}}

  /* Welcome */
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:40px;text-align:center;color:var(--muted)}
  .welcome h2{color:var(--text);font-size:1.5rem}
  .welcome p{font-size:.9rem;max-width:400px}
  .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
  .sug{background:var(--card);border:1px solid var(--border);padding:8px 14px;border-radius:20px;font-size:.85rem;cursor:pointer;transition:.15s;color:var(--text)}
  .sug:hover{border-color:var(--primary);color:var(--primary)}

  /* Input */
  footer{padding:16px 20px;background:var(--side);border-top:1px solid var(--border);flex-shrink:0}
  .input-wrap{display:flex;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 12px;transition:.15s;max-width:840px;margin:0 auto}
  .input-wrap:focus-within{border-color:var(--primary)}
  #input{flex:1;background:none;border:none;color:var(--text);font-size:.92rem;resize:none;outline:none;min-height:24px;max-height:140px;overflow-y:auto;line-height:1.5;font-family:inherit}
  #input::placeholder{color:var(--muted)}
  #input::-webkit-scrollbar{width:4px}
  #input::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .send-btn{background:var(--primary);border:none;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:flex-end;flex-shrink:0;transition:.15s;font-size:1rem}
  .send-btn:hover{background:var(--primary-hover)}
  .send-btn:disabled{background:var(--border);cursor:not-allowed;color:var(--muted)}
  .footer-hint{text-align:center;color:var(--muted);font-size:.75rem;margin-top:8px;max-width:840px;margin-left:auto;margin-right:auto}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    PasTech AI
  </div>
  <div class="header-controls">
    <div class="status-dot" id="statusDot"></div>
    <select id="modelSelect">
      <option value="qwen2.5:7b">qwen2.5:7b</option>
      <option value="gemma3:4b">gemma3:4b</option>
      <option value="llama3.2:3b">llama3.2:3b</option>
    </select>
    <button class="btn-icon" onclick="newSession()" title="New chat">+ New</button>
    <button class="btn-icon" onclick="clearMessages()" title="Clear">🗑</button>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div style="font-size:3rem">🤖</div>
    <h2>PasTech AI</h2>
    <p>Local AI Assistant — powered by Ollama + Qdrant + SQL Server</p>
    <div class="suggestions">
      <div class="sug" onclick="sendSuggestion(this)">PasTech คืออะไร?</div>
      <div class="sug" onclick="sendSuggestion(this)">สรุปข้อมูลบริษัท</div>
      <div class="sug" onclick="sendSuggestion(this)">บริการของเรามีอะไรบ้าง?</div>
      <div class="sug" onclick="sendSuggestion(this)">ช่วยเขียนโค้ด Python</div>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="input" placeholder="พิมพ์ข้อความ..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="footer-hint">Session: <span id="sessionId"></span> · <span id="userIdDisplay"></span></div>
</footer>

<script>
const API = '';

let sessionId = localStorage.getItem('pai_session') || newId();
let userId    = localStorage.getItem('pai_user')    || 'user_' + newId().slice(0,8);
let streaming  = false;

localStorage.setItem('pai_session', sessionId);
localStorage.setItem('pai_user', userId);
document.getElementById('sessionId').textContent = sessionId.slice(0,8) + '...';
document.getElementById('userIdDisplay').textContent = 'User: ' + userId;

checkHealth();

function newId() { return crypto.randomUUID(); }

async function checkHealth() {
  const dot = document.getElementById('statusDot');
  try {
    const r = await fetch(API + '/health');
    dot.className = r.ok ? 'status-dot' : 'status-dot offline';
  } catch { dot.className = 'status-dot offline'; }
}

function newSession() {
  sessionId = newId();
  localStorage.setItem('pai_session', sessionId);
  document.getElementById('sessionId').textContent = sessionId.slice(0,8) + '...';
  clearMessages();
}

function clearMessages() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  msgs.appendChild(document.getElementById('welcome') || createWelcome());
  showWelcome();
}

function showWelcome() {
  let w = document.getElementById('welcome');
  if (!w) {
    w = document.createElement('div');
    w.id = 'welcome'; w.className = 'welcome';
    w.innerHTML = `<div style="font-size:3rem">🤖</div><h2>PasTech AI</h2><p>Local AI Assistant</p>`;
  }
  document.getElementById('messages').appendChild(w);
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function sendSuggestion(el) {
  document.getElementById('input').value = el.textContent;
  sendMessage();
}

function appendMsg(role, text) {
  hideWelcome();
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'user' ? '👤' : '🤖';
  div.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble" id="bubble-${Date.now()}">${escHtml(text)}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div.querySelector('.bubble');
}

function appendThinking() {
  hideWelcome();
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'thinking';
  div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderText(s) {
  // code blocks
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) =>
    `<pre><code>${escHtml(code.trim())}</code></pre>`);
  // inline code
  s = s.replace(/`([^`]+)`/g, (_,c) => `<code>${escHtml(c)}</code>`);
  // bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // line breaks
  s = s.replace(/\n/g, '<br>');
  return s;
}

const textarea = document.getElementById('input');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
});
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

async function sendMessage() {
  if (streaming) return;
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  streaming = true;

  appendMsg('user', msg);
  const thinking = appendThinking();

  const model = document.getElementById('modelSelect').value;

  try {
    const resp = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, userId, message: msg, model })
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    thinking.remove();
    const bubble = appendMsg('ai', '');

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const obj = JSON.parse(data);
          const token = obj.Content ?? obj.content ?? obj.token ?? obj ?? '';
          if (typeof token === 'string') {
            full += token;
            bubble.innerHTML = renderText(full);
            document.getElementById('messages').scrollTop = 999999;
          }
        } catch {}
      }
    }

    if (!full) bubble.innerHTML = '<em style="color:var(--muted)">ไม่ได้รับคำตอบ</em>';
    bubble.innerHTML = renderText(full);

  } catch (e) {
    thinking.remove();
    appendMsg('ai', '❌ Error: ' + e.message);
  } finally {
    streaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('messages').scrollTop = 999999;
    textarea.focus();
  }
}

// Poll health every 30s
setInterval(checkHealth, 30000);
</script>
</body>
</html>
