<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAS AI</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--side:#16181f;--card:#1e2028;--border:#2a2d38;
    --primary:#6c63ff;--primary-hover:#7c74ff;--text:#e8eaf0;--muted:#8b8fa8;
    --user-bg:#6c63ff;--ai-bg:#1e2028;--code-bg:#12141a;
    --green:#4caf7d;--red:#f06292;--orange:#ff9f43;
  }
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--side);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
  .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1rem;white-space:nowrap}
  .logo-icon{width:30px;height:30px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
  .header-controls{display:flex;align-items:center;gap:8px}
  select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:8px;font-size:.82rem;cursor:pointer;outline:none}
  select:focus{border-color:var(--primary)}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
  .status-dot.offline{background:var(--red)}
  .btn-icon{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:8px;cursor:pointer;font-size:.82rem;transition:.15s}
  .btn-icon:hover{border-color:var(--primary);color:var(--text)}

  /* Mode tabs */
  .mode-tabs{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px}
  .mode-tab{padding:5px 14px;border-radius:7px;font-size:.82rem;cursor:pointer;color:var(--muted);border:none;background:none;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
  .mode-tab.active{background:var(--primary);color:#fff}
  .mode-tab:hover:not(.active){color:var(--text)}
  .mode-tab .model-badge{font-size:.68rem;opacity:.7;font-family:monospace}

  /* Messages */
  #messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
  #messages::-webkit-scrollbar{width:6px}
  #messages::-webkit-scrollbar-track{background:transparent}
  #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .msg{display:flex;gap:10px;max-width:820px;width:100%;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.user{flex-direction:row-reverse;align-self:flex-end}
  .msg.ai{align-self:flex-start}

  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:2px}
  .msg.user .avatar{background:var(--user-bg)}
  .msg.ai  .avatar{background:var(--card);border:1px solid var(--border)}

  .bubble{max-width:680px;padding:12px 16px;border-radius:16px;line-height:1.65;font-size:.92rem;white-space:pre-wrap;word-break:break-word}
  .msg.user .bubble{background:var(--user-bg);border-bottom-right-radius:4px}
  .msg.ai  .bubble{background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:4px}
  .bubble code{background:var(--code-bg);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:.88em}
  .bubble pre{background:var(--code-bg);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
  .bubble pre code{background:none;padding:0}

  .thinking{display:flex;gap:4px;padding:4px 0}
  .thinking span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
  .thinking span:nth-child(2){animation-delay:.15s}
  .thinking span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:none}30%{transform:translateY(-6px)}}

  /* Welcome */
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;padding:40px;text-align:center;color:var(--muted)}
  .welcome h2{color:var(--text);font-size:1.4rem}
  .welcome p{font-size:.88rem;max-width:400px;line-height:1.6}
  .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
  .sug{background:var(--card);border:1px solid var(--border);padding:7px 14px;border-radius:20px;font-size:.83rem;cursor:pointer;transition:.15s;color:var(--text)}
  .sug:hover{border-color:var(--primary);color:var(--primary)}

  /* ERP login banner */
  #erpLoginBanner{display:none;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center;gap:12px;flex-direction:column;align-items:center;max-width:400px;margin:auto}
  #erpLoginBanner h3{font-size:1.05rem;color:var(--text)}
  #erpLoginBanner p{font-size:.83rem;color:var(--muted)}
  .login-btn{background:var(--primary);color:#fff;border:none;padding:9px 22px;border-radius:8px;font-size:.88rem;cursor:pointer;transition:.15s}
  .login-btn:hover{background:var(--primary-hover)}
  .erp-user-tag{background:var(--card);border:1px solid var(--green);color:var(--green);padding:3px 9px;border-radius:20px;font-size:.78rem}

  /* Input */
  footer{padding:14px 20px;background:var(--side);border-top:1px solid var(--border);flex-shrink:0}
  .input-wrap{display:flex;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 12px;transition:.15s;max-width:840px;margin:0 auto}
  .input-wrap:focus-within{border-color:var(--primary)}
  #input{flex:1;background:none;border:none;color:var(--text);font-size:.92rem;resize:none;outline:none;min-height:24px;max-height:140px;overflow-y:auto;line-height:1.5;font-family:inherit}
  #input::placeholder{color:var(--muted)}
  #input::-webkit-scrollbar{width:4px}
  #input::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .send-btn{background:var(--primary);border:none;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:flex-end;flex-shrink:0;transition:.15s;font-size:1rem}
  .send-btn:hover{background:var(--primary-hover)}
  .send-btn:disabled{background:var(--border);cursor:not-allowed;color:var(--muted)}
  .footer-hint{text-align:center;color:var(--muted);font-size:.73rem;margin-top:7px;max-width:840px;margin-left:auto;margin-right:auto}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏢</div>
    PAS AI
  </div>
  <div class="header-controls">
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabPasai"   onclick="setMode('pasai')">
        🏢 PAS AI <span class="model-badge" id="badgePasai">gemma3:4b</span>
      </button>
      <button class="mode-tab" id="tabGeneral" onclick="setMode('general')">
        💬 ทั่วไป <span class="model-badge" id="badgeGeneral">gemma3:4b</span>
      </button>
      <button class="mode-tab" id="tabAgent"   onclick="setMode('agent')">
        🤖 Agent <span class="model-badge" id="badgeAgent">qwen2.5:7b</span>
      </button>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <select id="modelSelect" onchange="onModelChange()">
      <option value="qwen2.5:7b">qwen2.5:7b</option>
      <option value="gemma3:4b">gemma3:4b</option>
      <option value="qwen2.5-coder:7b">qwen2.5-coder:7b</option>
      <option value="llama3.2:3b">llama3.2:3b</option>
    </select>
    <button class="btn-icon" onclick="newSession()" title="New chat">+ New</button>
    <button class="btn-icon" onclick="clearMessages()" title="Clear">🗑</button>
  </div>
</header>

<div id="messages">
  <div id="erpLoginBanner">
    <div style="font-size:2.2rem">🔐</div>
    <h3>Agent ERP — ต้องเข้าสู่ระบบ</h3>
    <p>ใช้ ERP Account ของคุณ</p>
    <input id="erpEmail"    type="email"    placeholder="Email"    style="width:260px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.88rem;outline:none" autocomplete="email">
    <input id="erpPassword" type="password" placeholder="Password" style="width:260px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.88rem;outline:none" autocomplete="current-password" onkeydown="if(event.key==='Enter')erpLogin()">
    <div id="erpLoginError" style="color:var(--red);font-size:.8rem;min-height:16px"></div>
    <button class="login-btn" id="erpLoginBtn" onclick="erpLogin()">🔑 เข้าสู่ระบบ</button>
  </div>
  <div class="welcome" id="welcome">
    <div style="font-size:2.8rem" id="welcomeIcon">🏢</div>
    <h2 id="welcomeTitle">PAS AI</h2>
    <p id="welcomeDesc">AI ของบริษัท PasTech — ข้อมูลองค์กร ความรู้ภายใน และระบบต่างๆ</p>
    <div class="suggestions" id="suggestions">
      <div class="sug" onclick="sendSuggestion(this)">PasTech คืออะไร?</div>
      <div class="sug" onclick="sendSuggestion(this)">สรุปข้อมูลบริษัท</div>
      <div class="sug" onclick="sendSuggestion(this)">บริการของเรามีอะไรบ้าง?</div>
      <div class="sug" onclick="sendSuggestion(this)">ช่วยร่างอีเมลธุรกิจ</div>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="input" placeholder="ถามเกี่ยวกับ PasTech..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="footer-hint">
    <span id="modeLabel">🏢 PAS AI</span> ·
    Session: <span id="sessionId"></span> ·
    <span id="userIdDisplay"></span>
    <span id="erpUserTag" style="display:none"> · <span class="erp-user-tag" id="erpUserLabel"></span> <a href="#" onclick="erpLogout();return false;" style="color:var(--muted);font-size:.72rem">[ออก]</a></span>
  </div>
</footer>

<script>
const API = '';

// ── Mode config ────────────────────────────────────────────────────────────
const MODES = {
  pasai: {
    model:       'gemma3:4b',
    lockModel:   true,
    endpoint:    '/api/chat',
    systemPrompt:'คุณคือ PAS AI ผู้ช่วย AI ของบริษัท PasTech คุณตอบได้เฉพาะเรื่องที่เกี่ยวกับบริษัท PasTech เท่านั้น เช่น บริการ ผลิตภัณฑ์ นโยบาย ข้อมูลองค์กร และงานภายใน ถ้าคำถามไม่เกี่ยวกับบริษัท ให้แจ้งสุภาพว่าไม่อยู่ในขอบเขต และแนะนำให้ไปใช้ tab 💬 ทั่วไป แทน ตอบเป็นภาษาไทยเสมอ',
    avatar:      '🏢',
    icon:        '🏢',
    title:       'PAS AI',
    desc:        'AI ของบริษัท PasTech — ตอบเฉพาะข้อมูลองค์กร บริการ และงานภายใน',
    placeholder: 'ถามเกี่ยวกับ PasTech...',
    label:       '🏢 PAS AI',
    suggestions: ['PasTech คืออะไร?','บริการของเรามีอะไรบ้าง?','ช่วยร่างอีเมลธุรกิจ','นโยบายของบริษัท'],
  },
  general: {
    model:       'gemma3:4b',
    lockModel:   false,
    endpoint:    '/api/chat',
    avatar:      '💬',
    icon:        '💬',
    title:       'ทั่วไป',
    desc:        'สนทนาทั่วไป ถามตอบ เขียน โค้ด แปลภาษา — เลือก model ได้เอง',
    placeholder: 'พิมพ์อะไรก็ได้...',
    label:       '💬 ทั่วไป',
    suggestions: ['ช่วยเขียนโค้ด Python','แปลภาษาอังกฤษ','อธิบายแนวคิด RAG','ช่วยสรุปเอกสาร'],
  },
  agent: {
    model:       'qwen2.5:7b',
    lockModel:   true,
    endpoint:    '/api/room/chat',
    avatar:      '🤖',
    icon:        '🤖',
    title:       'Agent',
    desc:        'AI อัจฉริยะที่ใช้ tools — จองห้อง เช็คตาราง และระบบ ERP (ต้องล็อกอิน)',
    placeholder: 'จองห้อง / ถาม ERP...',
    label:       '🤖 Agent',
    suggestions: ['มีห้องประชุมอะไรบ้าง?','จองห้อง A พรุ่งนี้ 10-12 โมง','ดูรายการจองของฉัน','ห้อง B ว่างบ่ายสองไหม?'],
  },
};

let sessionId = localStorage.getItem('pai_session') || newId();
let userId    = localStorage.getItem('pai_user')    || 'user_' + newId().slice(0,8);
let streaming = false;
let mode      = 'pasai';
let erpToken  = localStorage.getItem('pai_erp_token') || null;

localStorage.setItem('pai_session', sessionId);
localStorage.setItem('pai_user', userId);
document.getElementById('sessionId').textContent    = sessionId.slice(0,8) + '...';
document.getElementById('userIdDisplay').textContent = 'User: ' + userId;

checkHealth();
refreshErpTag();

function newId() { return crypto.randomUUID(); }

// ── Mode switching ─────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  const cfg = MODES[m];

  // Update tab active state + badges
  Object.keys(MODES).forEach(k => {
    const tab = document.getElementById('tab' + k.charAt(0).toUpperCase() + k.slice(1));
    if (tab) tab.classList.toggle('active', k === m);
    const badge = document.getElementById('badge' + k.charAt(0).toUpperCase() + k.slice(1));
    if (badge) badge.textContent = MODES[k].model;
  });

  // Auto-switch model
  const sel = document.getElementById('modelSelect');
  sel.value    = cfg.model;
  sel.disabled = cfg.lockModel;
  sel.style.opacity = cfg.lockModel ? '0.5' : '1';

  // Update welcome content
  document.getElementById('welcomeIcon').textContent  = cfg.icon;
  document.getElementById('welcomeTitle').textContent = cfg.title;
  document.getElementById('welcomeDesc').textContent  = cfg.desc;
  document.getElementById('input').placeholder        = cfg.placeholder;
  document.getElementById('modeLabel').textContent    = cfg.label;

  document.getElementById('suggestions').innerHTML =
    cfg.suggestions.map(s => `<div class="sug" onclick="sendSuggestion(this)">${s}</div>`).join('');

  // ERP login banner (Agent mode only when not logged in)
  const banner    = document.getElementById('erpLoginBanner');
  const inputWrap = document.querySelector('.input-wrap');
  const needsErpLogin = (m === 'agent') && !erpToken;
  banner.style.display    = needsErpLogin ? 'flex' : 'none';
  inputWrap.style.display = needsErpLogin ? 'none' : '';

  clearMessages();
}

function onModelChange() {
  const cfg = MODES[mode];
  if (!cfg.lockModel) {
    const badge = document.getElementById('badgeGeneral');
    if (badge) badge.textContent = document.getElementById('modelSelect').value;
  }
}

// ── ERP Auth ───────────────────────────────────────────────────────────────
async function erpLogin() {
  const email    = document.getElementById('erpEmail')?.value?.trim();
  const password = document.getElementById('erpPassword')?.value;
  const errEl    = document.getElementById('erpLoginError');
  const btn      = document.getElementById('erpLoginBtn');

  if (!email || !password) { if (errEl) errEl.textContent = 'กรุณากรอก Email และ Password'; return; }
  if (errEl) errEl.textContent = '';
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...'; }

  try {
    const r    = await fetch(API + '/api/erp/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) { if (errEl) errEl.textContent = data.error || 'Login ไม่สำเร็จ'; return; }
    erpToken = data.token;
    localStorage.setItem('pai_erp_token', erpToken);
    refreshErpTag();
    setMode('agent');
  } catch { if (errEl) errEl.textContent = 'ไม่สามารถเชื่อมต่อ ERP ได้'; }
  finally { if (btn) { btn.disabled = false; btn.textContent = '🔑 เข้าสู่ระบบ'; } }
}

function erpLogout() {
  erpToken = null;
  localStorage.removeItem('pai_erp_token');
  refreshErpTag();
  setMode('agent');
}

function refreshErpTag() {
  const tag   = document.getElementById('erpUserTag');
  const label = document.getElementById('erpUserLabel');
  if (erpToken) {
    try {
      const p = JSON.parse(atob(erpToken.split('.')[1]));
      label.textContent  = '🔑 ' + (p.display_name || p.first_name || p.email || 'ERP User');
      tag.style.display  = '';
    } catch { tag.style.display = 'none'; }
  } else { tag.style.display = 'none'; }
}

// ── Health ─────────────────────────────────────────────────────────────────
async function checkHealth() {
  const dot = document.getElementById('statusDot');
  try {
    const r = await fetch(API + '/health');
    dot.className = r.ok ? 'status-dot' : 'status-dot offline';
  } catch { dot.className = 'status-dot offline'; }
}

// ── Session ────────────────────────────────────────────────────────────────
function newSession() {
  sessionId = newId();
  localStorage.setItem('pai_session', sessionId);
  document.getElementById('sessionId').textContent = sessionId.slice(0,8) + '...';
  clearMessages();
}

function clearMessages() {
  const msgs    = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  const banner  = document.getElementById('erpLoginBanner');
  msgs.innerHTML = '';
  msgs.appendChild(banner);
  msgs.appendChild(welcome);
  welcome.style.display = '';
}

function hideWelcome() { document.getElementById('welcome').style.display = 'none'; }

function sendSuggestion(el) {
  document.getElementById('input').value = el.textContent;
  sendMessage();
}

// ── Messages ───────────────────────────────────────────────────────────────
function appendMsg(role, text) {
  hideWelcome();
  const wrap   = document.getElementById('messages');
  const div    = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'user' ? '👤' : (MODES[mode]?.avatar || '🤖');
  div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${escHtml(text)}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div.querySelector('.bubble');
}

function appendThinking() {
  hideWelcome();
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg ai'; div.id = 'thinking';
  const avatar = MODES[mode]?.avatar || '🤖';
  div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderText(s) {
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${escHtml(c.trim())}</code></pre>`);
  s = s.replace(/`([^`]+)`/g, (_,c) => `<code>${escHtml(c)}</code>`);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

// ── Input auto-resize ──────────────────────────────────────────────────────
const textarea = document.getElementById('input');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
});
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Send message ───────────────────────────────────────────────────────────
async function sendMessage() {
  if (streaming) return;
  const input = document.getElementById('input');
  const msg   = input.value.trim();
  if (!msg) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  streaming = true;

  appendMsg('user', msg);
  const thinking = appendThinking();

  const cfg     = MODES[mode];
  const model   = document.getElementById('modelSelect').value;
  const headers = { 'Content-Type': 'application/json' };
  if (erpToken) headers['Authorization'] = 'Bearer ' + erpToken;

  // Agent mode: try ERP endpoint if token present, else room
  const endpoint = (mode === 'agent' && erpToken) ? '/api/erp/chat' : cfg.endpoint;

  try {
    const resp = await fetch(API + endpoint, {
      method: 'POST', headers,
      body: JSON.stringify({ sessionId, userId, message: msg, model, systemPrompt: cfg.systemPrompt || '' })
    });

    if (!resp.ok) {
      if ((resp.status === 401 || resp.status === 403) && mode === 'agent') {
        const body = await resp.json().catch(() => ({}));
        thinking.remove();
        appendMsg('ai', `🔐 ${body.error || 'กรุณาเข้าสู่ระบบ ERP ใหม่'}`);
        if (resp.status === 401) {
          erpToken = null;
          localStorage.removeItem('pai_erp_token');
          refreshErpTag();
          setTimeout(() => setMode('agent'), 1500);
        }
        return;
      }
      throw new Error('HTTP ' + resp.status);
    }

    thinking.remove();
    const bubble = appendMsg('ai', '');

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '', buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const obj   = JSON.parse(data);
          const token = obj.Content ?? obj.content ?? obj.token ?? obj ?? '';
          if (typeof token === 'string') { full += token; bubble.innerHTML = renderText(full); document.getElementById('messages').scrollTop = 999999; }
        } catch {}
      }
    }

    if (!full) bubble.innerHTML = '<em style="color:var(--muted)">ไม่ได้รับคำตอบ</em>';
    else bubble.innerHTML = renderText(full);

  } catch (e) {
    thinking.remove();
    appendMsg('ai', '❌ Error: ' + e.message);
  } finally {
    streaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('messages').scrollTop = 999999;
    textarea.focus();
  }
}

setInterval(checkHealth, 30000);
</script>
</body>
